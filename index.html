<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stranger Things Quote Search</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-dark: #0a0a0a;
            --bg-card: #141414;
            --bg-card-hover: #1a1a1a;
            --accent-red: #e50914;
            --accent-red-hover: #f40612;
            --accent-blue: #2292e8;
            --text-primary: #ffffff;
            --text-secondary: #a3a3a3;
            --border-color: #2a2a2a;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-primary);
            min-height: 100vh;
            background-image: 
                radial-gradient(ellipse at 50% 0%, rgba(34, 146, 232, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(229, 9, 20, 0.1) 0%, transparent 40%);
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .logo {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo h1 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 3.5rem;
            letter-spacing: 4px;
            background: linear-gradient(135deg, var(--text-primary) 0%, var(--accent-blue) 50%, var(--accent-red) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .logo .subtitle {
            color: var(--text-secondary);
            font-size: 0.9rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-top: 8px;
        }

        .search-container {
            position: relative;
            margin-bottom: 40px;
        }

        .search-input {
            width: 100%;
            padding: 20px 24px;
            padding-left: 56px;
            font-size: 1.1rem;
            background: var(--bg-card);
            border: 2px solid var(--border-color);
            border-radius: 12px;
            color: var(--text-primary);
            transition: all 0.3s ease;
        }

        .search-input:focus {
            outline: none;
            border-color: var(--accent-blue);
            box-shadow: 0 0 0 4px rgba(34, 146, 232, 0.15);
        }

        .search-input::placeholder {
            color: var(--text-secondary);
        }

        .search-icon {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
            font-size: 1.2rem;
        }

        .results-info {
            color: var(--text-secondary);
            margin-bottom: 20px;
            font-size: 0.9rem;
        }

        .quote-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 16px;
            transition: all 0.3s ease;
        }

        .quote-card:hover {
            background: var(--bg-card-hover);
            border-color: var(--accent-blue);
            transform: translateY(-2px);
        }

        .quote-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 16px;
        }

        .character-name {
            font-weight: 600;
            font-size: 1.1rem;
            color: var(--accent-blue);
        }

        .episode-info {
            color: var(--text-secondary);
            font-size: 0.85rem;
            background: rgba(255,255,255,0.05);
            padding: 4px 10px;
            border-radius: 20px;
        }

        .quote-text {
            font-size: 1.2rem;
            line-height: 1.6;
            margin-bottom: 20px;
            font-style: italic;
            color: var(--text-primary);
            position: relative;
            padding-left: 20px;
        }

        .quote-text::before {
            content: '"';
            position: absolute;
            left: 0;
            top: -5px;
            font-size: 2rem;
            color: var(--accent-red);
            font-style: normal;
        }

        .audio-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 12px 24px;
            background: var(--accent-red);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .audio-btn:hover {
            background: var(--accent-red-hover);
            transform: scale(1.02);
        }

        .audio-btn.playing {
            background: var(--accent-blue);
            animation: pulse 1.5s infinite;
        }

        .audio-btn .icon {
            font-size: 1.1rem;
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(34, 146, 232, 0.4); }
            50% { box-shadow: 0 0 0 10px rgba(34, 146, 232, 0); }
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }

        .empty-state .icon {
            font-size: 4rem;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        .empty-state h3 {
            font-size: 1.3rem;
            color: var(--text-primary);
            margin-bottom: 10px;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: var(--text-secondary);
        }

        .hidden {
            display: none !important;
        }

        .footer {
            text-align: center;
            margin-top: 60px;
            padding-top: 30px;
            border-top: 1px solid var(--border-color);
            color: var(--text-secondary);
            font-size: 0.85rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <h1>STRANGER THINGS</h1>
            <p class="subtitle">Quote Search + Original Audio</p>
        </div>

        <div class="search-container">
            <span class="search-icon">🔍</span>
            <input 
                type="text" 
                class="search-input" 
                id="searchInput" 
                placeholder="Search quotes... (e.g., 'friends don't lie')"
                autocomplete="off"
            >
        </div>

        <div id="resultsInfo" class="results-info hidden"></div>
        <div id="resultsContainer"></div>

        <div class="footer">
            Stranger Things Quote Search Demo
        </div>
    </div>

    <script>
        const quotes = [
            {
                id: 1,
                quote: "Friends don't lie.",
                character: "Eleven",
                season: 1,
                episode: 3,
                episodeTitle: "Holly, Jolly",
                timestamp: "03:24",
                audioUrl: "https://www.soundjay.com/human/sounds/friends-dont-lie-01.mp3"
            },
            {
                id: 2,
                quote: "She's our friend and she's crazy.",
                character: "Dustin",
                season: 1,
                episode: 2,
                episodeTitle: "The Weirdo on Maple Street",
                timestamp: "28:15",
                audioUrl: "https://www.soundjay.com/human/sounds/crazy-friend-01.mp3"
            },
            {
                id: 3,
                quote: "Mornings are for coffee and contemplation.",
                character: "Chief Hopper",
                season: 1,
                episode: 1,
                episodeTitle: "The Vanishing of Will Byers",
                timestamp: "05:30",
                audioUrl: "https://www.soundjay.com/human/sounds/coffee-01.mp3"
            },
            {
                id: 4,
                quote: "Everything you've seen up until now... is going to change.",
                character: "Dr. Brenner",
                season: 1,
                episode: 8,
                episodeTitle: "The Upside Down",
                timestamp: "38:42",
                audioUrl: "https://www.soundjay.com/human/sounds/change-01.mp3"
            },
            {
                id: 5,
                quote: "I'm not gonna hurt you. I swear I'm not gonna hurt you.",
                character: "Bob Newby",
                season: 3,
                episode: 7,
                episodeTitle: "The Lost Sister",
                timestamp: "22:18",
                audioUrl: "https://www.soundjay.com/human/sounds/not-hurt-01.mp3"
            },
            {
                id: 6,
                quote: "The more you stranger things, the worse it gets.",
                character: "Bob Newby",
                season: 3,
                episode: 5,
                episodeTitle: "The Flayed",
                timestamp: "45:02",
                audioUrl: "https://www.soundjay.com/human/sounds/stranger-things-01.mp3"
            },
            {
                id: 7,
                quote: "We are not the monster here. You are.",
                character: "Eleven",
                season: 2,
                episode: 9,
                episodeTitle: "The Gate",
                timestamp: "52:17",
                audioUrl: "https://www.soundjay.com/human/sounds/monster-01.mp3"
            },
            {
                id: 8,
                quote: "You get sad, you eat. It's called stress baking.",
                character: "Robin Buckley",
                season: 3,
                episode: 3,
                episodeTitle: "The Case of the Missing Lifeguard",
                timestamp: "19:45",
                audioUrl: "https://www.soundjay.com/human/sounds/baking-01.mp3"
            },
            {
                id: 9,
                quote: "Sticks and stones may break my bones, but words will never hurt me.",
                character: "Max",
                season: 2,
                episode: 3,
                episodeTitle: "The Pollywog",
                timestamp: "31:22",
                audioUrl: "https://www.soundjay.com/human/sounds/sticks-stones-01.mp3"
            },
            {
                id: 10,
                quote: "We are all pretty bizarre. Some of us are just better at hiding it.",
                character: "Andrew",
                season: 1,
                episode: 2,
                episodeTitle: "The Weirdo on Maple Street",
                timestamp: "42:08",
                audioUrl: "https://www.soundjay.com/human/sounds/bizarre-01.mp3"
            }
        ];

        let currentAudio = null;
        let currentBtn = null;

        const searchInput = document.getElementById('searchInput');
        const resultsContainer = document.getElementById('resultsContainer');
        const resultsInfo = document.getElementById('resultsInfo');

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function highlightMatch(text, query) {
            if (!query) return escapeHtml(text);
            const regex = new RegExp(`(${query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
            return escapeHtml(text).replace(regex, '<mark style="background: rgba(34, 146, 232, 0.3); color: inherit; padding: 0 2px; border-radius: 2px;">$1</mark>');
        }

        function searchQuotes(query) {
            if (!query.trim()) return [];
            const lowerQuery = query.toLowerCase();
            return quotes.filter(q => 
                q.quote.toLowerCase().includes(lowerQuery) ||
                q.character.toLowerCase().includes(lowerQuery)
            );
        }

        function renderResults(results, query) {
            if (results.length === 0) {
                resultsContainer.innerHTML = `
                    <div class="empty-state">
                        <div class="icon">🔍</div>
                        <h3>No quotes found</h3>
                        <p>Try different keywords like "friends", "coffee", or "crazy"</p>
                    </div>
                `;
                return;
            }

            resultsInfo.textContent = `${results.length} result${results.length !== 1 ? 's' : ''} found`;
            resultsInfo.classList.remove('hidden');

            resultsContainer.innerHTML = results.map(q => `
                <div class="quote-card" data-id="${q.id}">
                    <div class="quote-header">
                        <span class="character-name">${highlightMatch(q.character, query)}</span>
                        <span class="episode-info">S${q.season} E${q.episode} • ${q.episodeTitle}</span>
                    </div>
                    <p class="quote-text">${highlightMatch(q.quote, query)}</p>
                    <button class="audio-btn" data-audio="${q.audioUrl}" data-id="${q.id}">
                        <span class="icon">🔊</span>
                        <span class="text">Listen to Original Audio</span>
                    </button>
                </div>
            `).join('');

            document.querySelectorAll('.audio-btn').forEach(btn => {
                btn.addEventListener('click', handleAudioPlay);
            });
        }

        function handleAudioPlay(e) {
            const btn = e.currentTarget;
            const audioUrl = btn.dataset.audio;
            const btnText = btn.querySelector('.text');

            if (currentAudio && currentAudio.src === audioUrl) {
                if (currentAudio.paused) {
                    currentAudio.play();
                    btn.classList.add('playing');
                    btnText.textContent = 'Playing...';
                } else {
                    currentAudio.pause();
                    currentAudio.currentTime = 0;
                    btn.classList.remove('playing');
                    btnText.textContent = 'Listen to Original Audio';
                    currentBtn = null;
                    currentAudio = null;
                }
                return;
            }

            if (currentAudio) {
                currentAudio.pause();
                currentAudio.currentTime = 0;
                if (currentBtn) {
                    currentBtn.classList.remove('playing');
                    currentBtn.querySelector('.text').textContent = 'Listen to Original Audio';
                }
            }

            currentAudio = new Audio(audioUrl);
            currentBtn = btn;

            currentAudio.addEventListener('ended', () => {
                btn.classList.remove('playing');
                btnText.textContent = 'Listen to Original Audio';
                currentAudio = null;
                currentBtn = null;
            });

            currentAudio.addEventListener('error', () => {
                btn.classList.remove('playing');
                btnText.textContent = 'Audio unavailable';
                currentAudio = null;
                currentBtn = null;
            });

            currentAudio.play().catch(() => {
                btnText.textContent = 'Audio unavailable';
            });

            btn.classList.add('playing');
            btnText.textContent = 'Playing...';
        }

        let debounceTimer;
        searchInput.addEventListener('input', (e) => {
            clearTimeout(debounceTimer);
            debounceTimer = setTimeout(() => {
                const query = e.target.value;
                const results = searchQuotes(query);
                renderResults(results, query);
            }, 150);
        });

        searchInput.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                searchInput.value = '';
                resultsInfo.classList.add('hidden');
                resultsContainer.innerHTML = `
                    <div class="empty-state">
                        <div class="icon">🎬</div>
                        <h3>Search Stranger Things Quotes</h3>
                        <p>Enter a phrase to find quotes from the show</p>
                    </div>
                `;
            }
        });

        resultsContainer.innerHTML = `
            <div class="empty-state">
                <div class="icon">🎬</div>
                <h3>Search Stranger Things Quotes</h3>
                <p>Enter a phrase to find quotes from the show</p>
            </div>
        `;
    </script>
</body>
</html>
