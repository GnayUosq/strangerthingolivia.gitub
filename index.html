<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stranger Things Quote Search</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-dark: #0a0a0a;
            --bg-card: #141414;
            --bg-card-hover: #1a1a1a;
            --accent-red: #e50914;
            --accent-red-hover: #f40612;
            --accent-blue: #2292e8;
            --accent-purple: #8b5cf6;
            --text-primary: #ffffff;
            --text-secondary: #a3a3a3;
            --border-color: #2a2a2a;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-primary);
            min-height: 100vh;
            background-image: 
                radial-gradient(ellipse at 50% 0%, rgba(34, 146, 232, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(229, 9, 20, 0.1) 0%, transparent 40%);
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .logo {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo h1 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 3.5rem;
            letter-spacing: 4px;
            background: linear-gradient(135deg, var(--text-primary) 0%, var(--accent-blue) 50%, var(--accent-red) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .logo .subtitle {
            color: var(--text-secondary);
            font-size: 0.9rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-top: 8px;
        }

        .search-container {
            position: relative;
            margin-bottom: 40px;
        }

        .search-input {
            width: 100%;
            padding: 20px 24px;
            padding-left: 56px;
            font-size: 1.1rem;
            background: var(--bg-card);
            border: 2px solid var(--border-color);
            border-radius: 12px;
            color: var(--text-primary);
            transition: all 0.3s ease;
        }

        .search-input:focus {
            outline: none;
            border-color: var(--accent-blue);
            box-shadow: 0 0 0 4px rgba(34, 146, 232, 0.15);
        }

        .search-input::placeholder {
            color: var(--text-secondary);
        }

        .search-icon {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
            font-size: 1.2rem;
        }

        .filter-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .filter-tab {
            padding: 8px 16px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            color: var(--text-secondary);
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .filter-tab:hover {
            border-color: var(--accent-blue);
            color: var(--text-primary);
        }

        .filter-tab.active {
            background: var(--accent-blue);
            border-color: var(--accent-blue);
            color: white;
        }

        .results-info {
            color: var(--text-secondary);
            margin-bottom: 20px;
            font-size: 0.9rem;
        }

        .quote-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            overflow: hidden;
            margin-bottom: 20px;
            transition: all 0.3s ease;
        }

        .quote-card:hover {
            background: var(--bg-card-hover);
            border-color: var(--accent-blue);
            transform: translateY(-2px);
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }

        .quote-image {
            width: 100%;
            height: 200px;
            object-fit: cover;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .quote-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .quote-image-placeholder {
            font-size: 4rem;
            opacity: 0.3;
        }

        .season-badge {
            position: absolute;
            top: 12px;
            left: 12px;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        .season-1 { background: #22c55e; color: #000; }
        .season-2 { background: #3b82f6; color: #fff; }
        .season-3 { background: #f59e0b; color: #000; }
        .season-4 { background: #8b5cf6; color: #fff; }
        .season-5 { background: #ef4444; color: #fff; }

        .quote-content {
            padding: 24px;
        }

        .quote-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 16px;
        }

        .character-name {
            font-weight: 600;
            font-size: 1.1rem;
            color: var(--accent-blue);
        }

        .episode-info {
            color: var(--text-secondary);
            font-size: 0.85rem;
            background: rgba(255,255,255,0.05);
            padding: 4px 10px;
            border-radius: 20px;
        }

        .quote-text {
            font-size: 1.15rem;
            line-height: 1.7;
            margin-bottom: 20px;
            font-style: italic;
            color: var(--text-primary);
            position: relative;
            padding-left: 20px;
        }

        .quote-text::before {
            content: '"';
            position: absolute;
            left: 0;
            top: -8px;
            font-size: 2.2rem;
            color: var(--accent-red);
            font-style: normal;
        }

        .quote-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }

        .timestamp {
            color: var(--text-secondary);
            font-size: 0.8rem;
        }

        .audio-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 12px 24px;
            background: var(--accent-red);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .audio-btn:hover {
            background: var(--accent-red-hover);
            transform: scale(1.02);
        }

        .audio-btn.playing {
            background: var(--accent-purple);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(139, 92, 246, 0.4); }
            50% { box-shadow: 0 0 0 10px rgba(139, 92, 246, 0); }
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }

        .empty-state .icon {
            font-size: 4rem;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        .empty-state h3 {
            font-size: 1.3rem;
            color: var(--text-primary);
            margin-bottom: 10px;
        }

        .hidden {
            display: none !important;
        }

        .footer {
            text-align: center;
            margin-top: 60px;
            padding-top: 30px;
            border-top: 1px solid var(--border-color);
            color: var(--text-secondary);
            font-size: 0.85rem;
        }

        .stats {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .stat-item {
            text-align: center;
        }

        .stat-number {
            font-size: 2rem;
            font-weight: 700;
            color: var(--accent-blue);
        }

        .stat-label {
            font-size: 0.8rem;
            color: var(--text-secondary);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <h1>STRANGER THINGS</h1>
            <p class="subtitle">Quote Search + Original Audio</p>
        </div>

        <div class="stats">

            <button class="filter-tab season-4" data-season="4">Season 4</button>

        <div id="resultsInfo" class="results-info hidden"></div>
        <div id="resultsContainer"></div>

        <div class="footer">
            Stranger Things Quote Search Demo - Images are placeholders
        </div>
    </div>

        let searchQuery = '';

        const searchInput = document.getElementById('searchInput');
        const resultsContainer = document.getElementById('resultsContainer');
        const resultsInfo = document.getElementById('resultsInfo');
        const filterTabs = document.querySelectorAll('.filter-tab');

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function highlightMatch(text, query) {
            if (!query) return escapeHtml(text);
            const regex = new RegExp(`(${query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
            return escapeHtml(text).replace(regex, '<mark style="background: rgba(34, 146, 232, 0.3); color: inherit; padding: 0 2px; border-radius: 2px;">$1</mark>');
        }

        function filterQuotes() {
            let filtered = quotes;
            
            if (currentFilter !== 'all') {
                filtered = filtered.filter(q => q.season === parseInt(currentFilter));
            }
            
            if (searchQuery.trim()) {
                const lowerQuery = searchQuery.toLowerCase();
                filtered = filtered.filter(q => 
                    q.quote.toLowerCase().includes(lowerQuery) ||
                    q.character.toLowerCase().includes(lowerQuery) ||
                    q.episodeTitle.toLowerCase().includes(lowerQuery)
                );
            }
            
            return filtered;
        }

        function renderResults(results, query) {
            if (results.length === 0) {
                resultsContainer.innerHTML = `
                    <div class="empty-state">
                        <div class="icon">🔍</div>
                        <h3>No quotes found</h3>
                        <p>Try different keywords or select a different season</p>
                    </div>
                `;
                resultsInfo.classList.add('hidden');
                return;
            }

            const filterText = currentFilter === 'all' ? '' : ` Season ${currentFilter}`;
            resultsInfo.textContent = `${results.length} result${results.length !== 1 ? 's' : ''} found${filterText}`;
            resultsInfo.classList.remove('hidden');

            resultsContainer.innerHTML = results.map(q => `
                <div class="quote-card" data-id="${q.id}">
                    <div class="quote-image">
                        <img src="${q.image}" alt="${q.character}" loading="lazy" onerror="this.style.display='none'; this.parentElement.innerHTML='<div class=\\'quote-image-placeholder\\'>🎬</div>';">
                        <span class="season-badge season-${q.season}">Season ${q.season}</span>
                    </div>
                    <div class="quote-content">
                        <div class="quote-header">
                            <span class="character-name">${highlightMatch(q.character, query)}</span>
                            <span class="episode-info">S${q.season} E${q.episode} • ${highlightMatch(q.episodeTitle, query)}</span>
                        </div>
                        <p class="quote-text">${highlightMatch(q.quote, query)}</p>
                        <div class="quote-footer">
                            <span class="timestamp">⏱ ${q.timestamp}</span>
                            <button class="audio-btn" data-audio="#" data-id="${q.id}">
                                <span class="icon">🔊</span>
                                <span class="text">Listen to Original Audio</span>
                            </button>
                        </div>
                    </div>
                </div>
            `).join('');

            document.querySelectorAll('.audio-btn').forEach(btn => {
                btn.addEventListener('click', handleAudioPlay);
            });
        }

        function handleAudioPlay(e) {
            const btn = e.currentTarget;
            const btnText = btn.querySelector('.text');
            
            // Demo - show notification
            if (btnText.textContent === 'Audio unavailable') {
                btnText.textContent = 'Listen to Original Audio';
                return;
            }
            
            btnText.textContent = 'Demo - Audio coming soon';
            btn.classList.add('playing');
            
            setTimeout(() => {
                btn.classList.remove('playing');
                btnText.textContent = 'Listen to Original Audio';
            }, 2000);
        }

        function updateResults() {
            const results = filterQuotes();
            renderResults(results, searchQuery);
        }

        let debounceTimer;
        searchInput.addEventListener('input', (e) => {
            clearTimeout(debounceTimer);
            debounceTimer = setTimeout(() => {
                searchQuery = e.target.value;
                updateResults();
            }, 150);
        });

        filterTabs.forEach(tab => {
            tab.addEventListener('click', () => {
                filterTabs.forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                currentFilter = tab.dataset.season;
                updateResults();
            });
        });

        searchInput.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                searchInput.value = '';
                searchQuery = '';
                updateResults();
            }
        });

        // Initial render
        updateResults();
    </script>
</body>
</html>
