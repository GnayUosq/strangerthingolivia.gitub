    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-dark: #0a0a0a;
            --bg-card: #141414;
            --bg-card-hover: #1a1a1a;
            --accent-red: #e50914;

            --accent-blue: #2292e8;
            --accent-purple: #8b5cf6;
            --text-primary: #ffffff;
            --text-secondary: #a3a3a3;
            --border-color: #2a2a2a;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-primary);
            min-height: 100vh;
            background-image: 
                radial-gradient(ellipse at 50% 0%, rgba(34, 146, 232, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(229, 9, 20, 0.1) 0%, transparent 40%);
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .logo {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo h1 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 3.5rem;
            letter-spacing: 4px;
            background: linear-gradient(135deg, var(--text-primary) 0%, var(--accent-blue) 50%, var(--accent-red) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .logo .subtitle {
            color: var(--text-secondary);
            font-size: 0.9rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-top: 8px;
        }

        .search-container {
            position: relative;
            margin-bottom: 30px;
        }

        .search-input {
            width: 100%;
            padding: 20px 24px;
            padding-left: 56px;
            font-size: 1.1rem;
            background: var(--bg-card);
            border: 2px solid var(--border-color);
            border-radius: 12px;
            color: var(--text-primary);
            transition: all 0.3s ease;
        }

        .search-input:focus {
            outline: none;
            border-color: var(--accent-blue);
            box-shadow: 0 0 0 4px rgba(34, 146, 232, 0.15);
        }

        .search-input::placeholder {
            color: var(--text-secondary);
        }

        .search-icon {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
            font-size: 1.2rem;
        }

        .filter-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .filter-tab {
            padding: 8px 16px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            color: var(--text-secondary);
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .filter-tab:hover {
            border-color: var(--accent-blue);
            color: var(--text-primary);
        }

        .filter-tab.active {
            background: var(--accent-blue);
            border-color: var(--accent-blue);
            color: white;
        }

        .results-info {
            color: var(--text-secondary);
            margin-bottom: 20px;
            font-size: 0.9rem;
        }

        .quote-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 12px;
            transition: all 0.3s ease;
        }

        .quote-card:hover {
            background: var(--bg-card-hover);
            border-color: var(--accent-blue);
        }

        .quote-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
            flex-wrap: wrap;
            gap: 8px;
        }

        .character-name {
            font-weight: 600;
            font-size: 1rem;
            color: var(--accent-blue);
        }

        .episode-info {
            color: var(--text-secondary);
            font-size: 0.8rem;
            background: rgba(255,255,255,0.05);
            padding: 4px 10px;
            border-radius: 20px;
        }

        .quote-text {
            font-size: 1rem;
            line-height: 1.6;
            margin-bottom: 16px;
            color: var(--text-primary);
        }

        .quote-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }

        .timestamp {
            color: var(--text-secondary);
            font-size: 0.75rem;
        }

        .audio-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 18px;
            background: var(--accent-red);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .audio-btn:hover {
            background: var(--accent-red-hover);
        }

        .audio-btn.playing {
            background: var(--accent-purple);
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }

        .empty-state .icon {
            font-size: 4rem;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        .empty-state h3 {
            font-size: 1.3rem;
            color: var(--text-primary);
            margin-bottom: 10px;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: var(--text-secondary);
        }

        .hidden {
            display: none !important;
        }

        .footer {
            text-align: center;
            margin-top: 60px;
            padding-top: 30px;
            border-top: 1px solid var(--border-color);
            color: var(--text-secondary);
            font-size: 0.85rem;

        .stats {

            gap: 30px;

        .stat-item {
            text-align: center;

        .stat-number {

            font-weight: 700;
            color: var(--accent-blue);
        }

        .stat-label {
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        mark {
            background: rgba(34, 146, 232, 0.3);
            color: inherit;
            padding: 0 2px;
            border-radius: 2px;
        }

        .load-more {
            text-align: center;

        .load-more button {

            background: var(--accent-blue);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
        }

        .load-more button:hover {
            background: #1a7acc;
        }
    </style>
</head>

        let currentFilter = 'all';
        let searchQuery = '';
        const RESULTS_PER_PAGE = 30;
        let displayedResults = 0;

        const searchInput = document.getElementById('searchInput');
        const resultsContainer = document.getElementById('resultsContainer');
        const resultsInfo = document.getElementById('resultsInfo');
        const filterTabs = document.querySelectorAll('.filter-tab');
        const loadMoreBtn = document.getElementById('loadMoreBtn');
        const loadMoreDiv = document.getElementById('loadMore');

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function highlightMatch(text, query) {
            if (!query) return escapeHtml(text);
            const regex = new RegExp(`(${query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
            return escapeHtml(text).replace(regex, '<mark>$1</mark>');
        }

        function filterQuotes() {
            let filtered = quotes;
            
            if (currentFilter !== 'all') {
                filtered = filtered.filter(q => q.season === parseInt(currentFilter));
            }
            
            if (searchQuery.trim()) {
                const lowerQuery = searchQuery.toLowerCase();
                filtered = filtered.filter(q => 
                    q.quote.toLowerCase().includes(lowerQuery) ||
                    q.character.toLowerCase().includes(lowerQuery) ||
                    q.episodeTitle.toLowerCase().includes(lowerQuery)
                );
            }
            
            return filtered;
        }

        function renderResults(results, query, append = false) {
            if (!append) {
                displayedResults = 0;
                if (results.length === 0) {
                    resultsContainer.innerHTML = `
                        <div class="empty-state">
                            <div class="icon">🔍</div>
                            <h3>No quotes found</h3>
                            <p>Try different keywords or select a different season</p>
                        </div>
                    `;
                    resultsInfo.classList.add('hidden');
                    loadMoreDiv.classList.add('hidden');
                    return;
                }

                const filterText = currentFilter === 'all' ? '' : ` Season ${currentFilter}`;
                resultsInfo.textContent = `${results.length} results found${filterText}`;
                resultsInfo.classList.remove('hidden');
            }

            const toShow = results.slice(displayedResults, displayedResults + RESULTS_PER_PAGE);
            
            const html = toShow.map(q => `
                <div class="quote-card" data-id="${q.id}">
                    <div class="quote-header">
                        <span class="character-name">${highlightMatch(q.character, query)}</span>
                        <span class="episode-info">S${q.season} E${q.episode} • ${highlightMatch(q.episodeTitle, query)}</span>
                    </div>
                    <p class="quote-text">${highlightMatch(q.quote, query)}</p>
                    <div class="quote-footer">
                        <span class="timestamp">⏱ ${q.timestamp}</span>
                        <button class="audio-btn" data-id="${q.id}">
                            <span>🔊</span>
                            <span>Listen</span>
                        </button>
                    </div>
                </div>
            `).join('');

            if (append) {
                resultsContainer.insertAdjacentHTML('beforeend', html);
            } else {
                resultsContainer.innerHTML = html;
            }

            displayedResults += toShow.length;

            if (displayedResults < results.length) {
                loadMoreDiv.classList.remove('hidden');
            } else {
                loadMoreDiv.classList.add('hidden');
            }

            document.querySelectorAll('.audio-btn').forEach(btn => {
                btn.addEventListener('click', handleAudioPlay);
            });
        }

        function handleAudioPlay(e) {
            const btn = e.currentTarget;
            const span = btn.querySelector('span:last-child');
            
            btn.classList.add('playing');
            span.textContent = 'Playing...';
            
            setTimeout(() => {
                btn.classList.remove('playing');
                span.textContent = 'Listen';
            }, 2000);
        }

        function updateResults(append = false) {
            const results = filterQuotes();
            renderResults(results, searchQuery, append);
        }

        let debounceTimer;
        searchInput.addEventListener('input', (e) => {
            clearTimeout(debounceTimer);
            debounceTimer = setTimeout(() => {
                searchQuery = e.target.value;
                updateResults(false);
            }, 150);
        });

        filterTabs.forEach(tab => {
            tab.addEventListener('click', () => {
                filterTabs.forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                currentFilter = tab.dataset.season;
                updateResults(false);
            });
        });

        loadMoreBtn.addEventListener('click', () => {
            const results = filterQuotes();
            renderResults(results, searchQuery, true);
        });

        searchInput.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                searchInput.value = '';
                searchQuery = '';
                updateResults(false);
            }
        });

        // Initial render
        updateResults(false);
    </script>
